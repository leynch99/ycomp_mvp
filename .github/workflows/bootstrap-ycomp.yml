name: Bootstrap YComp MVP

on:
  push:
    branches:
      - main
    paths:
      - bootstrap_source.b64
      - .github/workflows/bootstrap-ycomp.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Expand source archive
        run: |
          if [ ! -f bootstrap_source.b64 ]; then
            echo "No archive yet"
            exit 0
          fi
          python3 - <<'PY'
          import base64
          import pathlib
          import tarfile

          root = pathlib.Path('.')
          archive_text = pathlib.Path('bootstrap_source.b64').read_text(encoding='utf-8')
          archive_path = pathlib.Path('/tmp/ycomp_source.tar.xz')
          archive_path.write_bytes(base64.b64decode(archive_text))

          with tarfile.open(archive_path, 'r:xz') as archive:
              archive.extractall(root)

          pathlib.Path('bootstrap_source.b64').unlink(missing_ok=True)
          pathlib.Path('.github/workflows/bootstrap-ycomp.yml').unlink(missing_ok=True)
          PY
      - name: Commit expanded source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Add YComp MVP storefront"
          git push
